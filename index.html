<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SwitchEasy — TD</title>
<meta name="description" content="SwitchEasy — TD's AI agent that moves your recurring payments from your old bank, automatically.">
<meta name="theme-color" content="#008A00">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23008A00'/%3E%3Cpath d='M132 223 A128 128 0 0 1 354 174' fill='none' stroke='%23fff' stroke-width='46' stroke-linecap='round'/%3E%3Cpolygon points='392,232 393,170 336,206' fill='%23fff'/%3E%3Cpath d='M380 289 A128 128 0 0 1 158 338' fill='none' stroke='%23fff' stroke-width='46' stroke-linecap='round'/%3E%3Cpolygon points='120,280 119,342 176,306' fill='%23fff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --td-green:#008A00; --td-green-dark:#036303; --td-green-pale:#E6F4E6;
    --ink:#1C1C1C; --ink-soft:#616161; --paper:#F4F7F4; --surface:#FFFFFF; --line:#DCE3DC;
    --amber:#A66B00; --amber-pale:#FBF0DC;
    --shadow-card:0 1px 2px rgba(28,28,28,.04), 0 24px 64px -32px rgba(28,28,28,.25);
    --shadow-float:0 20px 50px -22px rgba(0,0,0,.28);
  }
  *,*::before,*::after{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1400px 700px at 50% -12%, #EDF3ED 0%, var(--paper) 60%) fixed;
    color:var(--ink);
    font-family:'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex; flex-direction:column;
  }
  ::selection{background:var(--td-green-pale);}
  h1{font-weight:700;font-size:34px;line-height:1.12;letter-spacing:-0.02em;margin:0 0 14px;color:var(--ink);}
  p{margin:0;}
  button{font-family:inherit;min-height:44px;}
  img{max-width:100%;display:block;}

  /* ---------- icon tiles (PNG drops in, emoji is the fallback) ----------
     Width adapts so wide brand wordmarks stay legible; square marks stay square. */
  .tile{min-width:40px;max-width:80px;height:40px;padding:0 7px;border-radius:10px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;overflow:hidden;}
  .tile img{max-width:100%;max-height:66%;width:auto;height:auto;object-fit:contain;}
  .tile .tile-emoji{line-height:1;}
  .tile.sm{min-width:24px;max-width:52px;height:24px;padding:0 4px;border-radius:7px;font-size:13px;}
  .tile.lg{min-width:68px;max-width:68px;height:68px;padding:0;border-radius:16px;font-size:30px;}
  .tile.lg img{max-width:100%;max-height:100%;}

  /* ---------- chrome bar ---------- */
  .chrome-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;height:62px;background:var(--surface);
    border-top:3px solid var(--td-green);
    border-bottom:1px solid var(--line);flex-shrink:0;
  }
  .chrome-left{display:flex;align-items:center;gap:12px;}
  .logo-tap{display:flex;align-items:center;justify-content:center;width:44px;height:44px;cursor:pointer;border-radius:8px;-webkit-tap-highlight-color:transparent;}
  .logo-tap img{width:28px;height:28px;object-fit:contain;}
  .wordmark{font-weight:700;font-size:18px;letter-spacing:-0.01em;}
  .wordmark small{font-weight:500;font-size:11px;color:var(--ink-soft);margin-left:7px;letter-spacing:0;}
  .proto-pill{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);
    background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:5px 12px;
  }
  .restart-btn{
    background:transparent;border:1px solid var(--line);border-radius:8px;
    padding:9px 18px;font-weight:600;font-size:13px;color:var(--ink);cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .restart-btn:hover{background:var(--paper);border-color:#c3d3c3;}
  .restart-btn:active{transform:scale(.97);}

  /* ---------- step rail ---------- */
  .rail{display:flex;padding:16px 40px 14px;background:transparent;border-bottom:1px solid var(--line);flex-shrink:0;}
  .rail-segment{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;}
  .rail-segment:not(:last-child)::after{
    content:'';position:absolute;top:5px;left:50%;width:100%;height:2px;background:var(--line);z-index:0;
    transition:background .4s;
  }
  .rail-segment.completed:not(:last-child)::after{background:var(--td-green);}
  .rail-dot{width:10px;height:10px;border-radius:50%;background:var(--line);position:relative;z-index:1;
    box-shadow:0 0 0 3px var(--paper);transition:background .3s, box-shadow .3s;}
  .rail-label{font-size:12px;font-weight:600;letter-spacing:.01em;color:var(--ink-soft);transition:color .3s;}
  .rail-segment.completed .rail-dot{background:var(--td-green);}
  .rail-segment.completed .rail-label{color:var(--td-green-dark);}
  .rail-segment.current .rail-dot{background:var(--td-green);box-shadow:0 0 0 3px var(--paper), 0 0 0 6px var(--td-green-pale);}
  .rail-segment.current .rail-label{color:var(--ink);font-weight:700;}

  /* ---------- stage / device ---------- */
  #stage{flex:1;display:flex;padding:32px 24px 48px;}
  #device{
    max-width:1080px;width:100%;margin:0 auto;background:var(--surface);
    border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow-card);
    overflow:hidden;position:relative;display:flex;flex-direction:column;min-height:640px;
    transition:background .4s ease, border-color .4s ease;
  }
  #screen-root{flex:1;display:flex;flex-direction:column;}
  .screen-pad{flex:1;display:flex;flex-direction:column;padding:48px 60px;}

  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;color:var(--td-green-dark);font-weight:600;margin-bottom:14px;text-transform:uppercase;}
  .subcopy{color:var(--ink-soft);font-size:15px;line-height:1.6;max-width:560px;}

  .pill-badge{display:inline-flex;align-items:center;gap:8px;background:var(--td-green-pale);color:var(--td-green-dark);border-radius:999px;padding:6px 14px;font-weight:600;font-size:13px;margin-bottom:20px;width:fit-content;}
  .pill-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--td-green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(1.35);}}

  .btn-primary{
    background:var(--td-green);color:#fff;border:none;border-radius:8px;
    padding:14px 26px;font-weight:600;font-size:15px;cursor:pointer;
    transition:background .15s, transform .12s, box-shadow .15s; width:fit-content;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-primary:hover:not(:disabled){background:var(--td-green-dark);box-shadow:0 10px 24px -12px rgba(0,138,0,.6);transform:translateY(-1px);}
  .btn-primary:active:not(:disabled){transform:scale(.98);box-shadow:none;}
  .btn-primary:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed;}
  .btn-ghost{background:transparent;border:none;color:var(--ink-soft);font-size:12.5px;font-weight:600;cursor:pointer;text-decoration:underline;min-height:auto;padding:4px;}

  input[type="text"], input[type="password"]{
    width:100%;max-width:420px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;
    font-size:15px;font-family:inherit;min-height:44px;background:#fff;color:var(--ink);
  }
  input:focus{outline:2px solid var(--td-green);outline-offset:1px;border-color:var(--td-green);}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:14px 0 6px;letter-spacing:.02em;}

  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
  .fade-in{animation:fadeIn .4s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes rowIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- Screen 0: landing ---------- */
  .landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-top:58px;padding-bottom:58px;}
  .landing-mark{display:flex;align-items:center;gap:15px;margin-bottom:30px;}
  .landing-mark img{width:54px;height:54px;object-fit:contain;}
  .landing-mark .landing-wordmark{font-size:31px;font-weight:700;letter-spacing:-0.02em;}
  .landing h1{font-size:44px;max-width:660px;margin-bottom:18px;}
  .landing .subcopy{max-width:580px;}
  .trust-row{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--ink-soft);margin-top:22px;flex-wrap:wrap;justify-content:center;}
  .trust-row .sep{color:var(--line);}
  .trust-row svg{color:var(--td-green-dark);}
  .landing-picker-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin:44px 0 18px;letter-spacing:.09em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .scenario-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:680px;}
  .scenario-card{
    text-align:left;background:var(--surface);border:2px solid var(--line);border-radius:14px;
    padding:24px 22px;cursor:pointer;transition:border-color .2s, transform .2s, box-shadow .2s;
    animation:rowIn .45s ease both;display:flex;flex-direction:column;
    -webkit-tap-highlight-color:transparent;
  }
  .scenario-card:hover{border-color:#c3d3c3;transform:translateY(-3px);box-shadow:0 16px 32px -22px rgba(28,28,28,.3);}
  .scenario-card.selected{border-color:var(--td-green);background:var(--td-green-pale);}
  .scenario-card .tile.lg{margin-bottom:14px;background:transparent;border:none;}
  .scenario-card-label{font-weight:700;font-size:17px;letter-spacing:-0.01em;margin-bottom:6px;}
  .scenario-card-tagline{color:var(--ink-soft);font-size:13px;line-height:1.5;flex:1;}
  .scenario-card-cta{color:var(--td-green-dark);font-weight:600;font-size:13px;margin-top:16px;}

  /* ---------- Screen 1: welcome ---------- */
  .welcome-screen{flex:1;display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;}
  .welcome-left h1{margin-top:6px;font-size:44px;}
  .stat-row{display:flex;gap:9px;flex-wrap:wrap;font-size:12px;font-weight:600;color:var(--ink);margin:24px 0 30px;white-space:nowrap;}
  .stat-row .sep{color:var(--line);font-weight:400;}
  .how-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:26px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8);}
  .how-title{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:18px;letter-spacing:.04em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .how-step{display:flex;gap:14px;padding:12px 0;align-items:flex-start;}
  .how-step + .how-step{border-top:1px dashed var(--line);}
  .how-num{width:28px;height:28px;border-radius:50%;background:var(--td-green);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .how-step-title{font-weight:700;font-size:14px;margin-bottom:2px;}
  .how-step-sub{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}

  /* ---------- Screen 2: institution ---------- */
  .bank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px;margin:28px 0;}
  .bank-card{
    background:#fff;border:2px solid var(--line);border-radius:14px;padding:16px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;
    transition:border-color .2s, box-shadow .2s, transform .2s;height:112px;position:relative;
    -webkit-tap-highlight-color:transparent;
  }
  .bank-card:hover{border-color:#c3d3c3;transform:translateY(-2px);}
  .bank-card.selected{border-color:var(--card-brand);box-shadow:0 12px 30px -14px var(--card-brand);}
  .bank-card.selected::after{
    content:'✓';position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;
    background:var(--card-brand);color:#fff;font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .bank-logo-wrap{display:flex;align-items:center;justify-content:center;}
  .bank-logo{max-height:58px;max-width:132px;width:auto;height:auto;object-fit:contain;}
  .bank-fallback{width:36px;height:36px;border-radius:8px;background:var(--ink-soft);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}
  .bank-fallback.small{width:28px;height:28px;font-size:13px;}
  .bank-name-solo{font-weight:700;font-size:16.5px;color:var(--ink);}
  .other-input-wrap{margin-bottom:20px;}

  /* ---------- Screen 3 + 7: auth cards ---------- */
  .connect-screen{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:18px;}
  .oauth-card{width:100%;max-width:420px;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-float);background:#fff;}
  .oauth-header{background:var(--brand);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:12px;}
  .oauth-header.light{background:#fff;color:var(--ink);border-bottom:1px solid var(--line);}
  .oauth-logo img{height:26px;width:auto;max-width:130px;object-fit:contain;border-radius:6px;background:#fff;padding:3px 6px;}
  .cred-avatar{min-width:30px;max-width:96px;height:30px;padding:0 6px;border-radius:8px;background:#fff;color:var(--brand);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
  .cred-avatar img{max-width:100%;max-height:64%;width:auto;height:auto;object-fit:contain;}
  .oauth-header.light .cred-avatar{background:var(--paper);border:1px solid var(--line);}
  .oauth-bankname{font-weight:700;font-size:16px;letter-spacing:-0.01em;flex:1;}
  .oauth-tag{font-size:10.5px;opacity:.75;font-weight:500;}
  .oauth-body{padding:24px;background:#fff;}
  .oauth-body input:focus{outline-color:var(--brand);border-color:var(--brand);}
  .oauth-btn{width:100%;background:var(--brand);}
  .oauth-btn:hover:not(:disabled){filter:brightness(0.88);background:var(--brand);box-shadow:none;transform:none;}
  .consent-text{font-size:12px;color:var(--ink-soft);line-height:1.5;margin-top:16px;margin-bottom:16px;}
  .oauth-secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--ink-soft);margin-top:14px;}
  .oauth-status{margin-top:14px;min-height:18px;font-size:12px;color:var(--ink-soft);opacity:0;transition:opacity .3s;text-align:center;}
  .oauth-status.visible{opacity:1;}
  .oauth-status.ok{color:var(--td-green-dark);}
  .cred-progress{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .cred-unlocks{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 6px;}
  .cred-chip{display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:4px 12px 4px 5px;font-size:12px;font-weight:600;}
  .cred-blurb{font-size:12px;color:var(--ink-soft);line-height:1.5;margin:10px 0 2px;}

  /* ---------- Screen 4: scan ---------- */
  .scan-screen{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .scan-counter{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:62px;font-weight:700;margin:18px 0 2px;color:var(--td-green-dark);letter-spacing:-0.02em;}
  .scan-label{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-soft);margin-bottom:20px;}
  .progress-track{width:100%;max-width:480px;height:8px;background:var(--paper);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-bottom:14px;}
  .progress-fill{height:100%;width:0;background:var(--td-green);transition:width .1s linear;border-radius:999px;}
  .scan-results{width:100%;max-width:860px;margin-top:20px;text-align:left;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .scan-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;animation:rowIn .35s ease both;}
  .tx-info{flex:1;display:flex;flex-direction:column;text-align:left;min-width:0;}
  .tx-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-sub{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-badge{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--paper);border:1px solid var(--line);padding:4px 8px;border-radius:6px;color:var(--ink-soft);white-space:nowrap;}

  /* ---------- Screen 5: review ---------- */
  .review-list{margin:24px 0;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .review-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;cursor:pointer;min-height:44px;transition:opacity .25s, background .15s;-webkit-tap-highlight-color:transparent;background:#fff;}
  .review-row:hover{background:var(--paper);}
  .review-row.excluded{opacity:.45;}
  .review-check{width:22px;height:22px;accent-color:var(--td-green);cursor:pointer;flex-shrink:0;}
  .review-footer{position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);padding:18px 0 0;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:auto;}
  .review-count-line{display:flex;flex-direction:column;gap:2px;}
  .review-monthly{font-size:11.5px;color:var(--ink-soft);}

  /* ---------- Screen 6: access plan ---------- */
  .plan-list{width:100%;margin:22px 0 8px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .plan-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;animation:rowIn .35s ease both;}
  .plan-note{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .plan-summary{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 22px;}
  .plan-chip{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--td-green-pale);color:var(--td-green-dark);border-radius:999px;padding:7px 14px;font-weight:600;animation:fadeIn .4s ease both;}

  /* ---------- Screen 8: consent ---------- */
  .consent-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .consent-box{max-width:560px;width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:var(--shadow-float);padding:30px 34px;text-align:left;margin:20px 0 24px;}
  .consent-box-title{font-weight:700;font-size:16px;margin-bottom:16px;}
  .consent-item{display:flex;gap:12px;padding:9px 0;font-size:13.5px;line-height:1.5;border-bottom:1px dashed var(--line);}
  .consent-item:last-of-type{border-bottom:none;}
  .consent-tick{color:var(--td-green-dark);font-weight:700;flex-shrink:0;}
  .consent-note{font-size:12px;color:var(--ink-soft);margin-top:14px;line-height:1.5;}
  .consent-ref{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--ink-soft);margin-top:14px;padding-top:12px;border-top:1px solid var(--line);}

  /* ---------- Screen 9: migration progress (consumer view) ---------- */
  .migrate-screen{flex:1;display:flex;flex-direction:column;}
  .migrate-head{display:flex;justify-content:space-between;align-items:flex-start;gap:28px;margin-bottom:24px;}
  .migrate-head h1{margin-bottom:10px;}
  .migrate-progress{text-align:right;flex-shrink:0;min-width:210px;padding-top:6px;}
  .migrate-count{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;font-size:30px;font-weight:700;color:var(--td-green-dark);margin-bottom:2px;line-height:1;}
  .migrate-count small{display:block;font-family:'Hanken Grotesk',sans-serif;font-size:12px;color:var(--ink-soft);font-weight:600;margin-top:6px;margin-bottom:10px;}
  .migrate-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:26px;flex:1;align-items:start;}
  .current-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px 22px;display:flex;gap:16px;align-items:center;min-height:96px;}
  .current-card .tile.lg{background:#fff;border:1px solid var(--line);min-width:68px;max-width:150px;padding:0 12px;}
  .current-card .tile.lg img{max-width:126px;max-height:60%;width:auto;height:auto;}
  .current-info{flex:1;min-width:0;}
  .current-name{font-weight:700;font-size:16px;letter-spacing:-0.01em;}
  .current-status{font-size:13px;color:var(--ink-soft);margin-top:4px;line-height:1.5;}
  .working-dots{display:inline-flex;gap:4px;margin-left:7px;vertical-align:middle;}

  .working-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dotpulse{0%,100%{opacity:.25;}50%{opacity:1;}}
  .agent-ticker{margin-top:12px;font-size:11px;color:var(--ink-soft);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:2px;}
  .status-list{border:1px solid var(--line);border-radius:14px;background:#fff;padding:4px 18px;max-height:470px;overflow-y:auto;}
  .status-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px;transition:background .3s;}
  .status-row:last-child{border-bottom:none;}
  .status-row .st-name{flex:1;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .st-state{font-size:12px;color:var(--ink-soft);white-space:nowrap;font-weight:500;}

  .status-row.active{background:var(--td-green-pale);margin:0 -12px;padding-left:12px;padding-right:12px;border-radius:8px;border-bottom-color:transparent;}
  .migrate-footer{border-top:1px solid var(--line);padding:18px 0 0;display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:20px;}

  /* killer shot — fake Rogers portal */
  .killer-panel{max-height:0;overflow:hidden;transition:max-height .5s ease;flex-shrink:0;margin-top:14px;}
  .killer-panel.expanded{max-height:460px;}
  .browser-mock{background:#e9edf0;border-radius:10px;overflow:hidden;position:relative;border:1px solid #cbd3d8;margin:10px 0;box-shadow:0 14px 34px -16px rgba(0,0,0,.55);}
  .browser-chrome{background:#dfe4e8;padding:8px 12px;display:flex;align-items:center;gap:6px;}
  .traffic{width:10px;height:10px;border-radius:50%;display:inline-block;}

  .browser-address{margin-left:10px;background:#fff;border-radius:6px;padding:4px 10px;font-size:11px;color:#555;font-family:'JetBrains Mono',monospace;flex:1;display:flex;align-items:center;gap:6px;}
  .browser-address svg{flex-shrink:0;color:#3d8a3d;}
  .browser-page{background:#F7F8F9;min-height:290px;position:relative;font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;}
  .portal-topbar{background:#fff;border-bottom:1px solid #E4E7EA;padding:10px 20px;display:flex;align-items:center;gap:22px;}
  .portal-brand{font-weight:800;font-size:17px;color:#DA291C;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
  .portal-brand img{height:18px;width:auto;object-fit:contain;}
  .portal-brand img + .pb-text{display:none;} /* wordmark image replaces the text; text returns if the image is missing */
  .portal-nav{display:flex;gap:16px;font-size:11.5px;color:#55606A;flex:1;}
  .portal-nav span.active{color:#1a1a1a;font-weight:700;border-bottom:2px solid #DA291C;padding-bottom:2px;}
  .portal-user{font-size:10.5px;color:#55606A;}
  .portal-crumb{padding:10px 20px 0;font-size:10.5px;color:#8A939B;}
  .portal-grid{display:flex;padding:10px 20px 18px;gap:18px;}
  .portal-side{width:150px;flex-shrink:0;}
  .portal-nav-item{padding:8px 10px;font-size:11.5px;color:#55606A;border-radius:6px;}
  .portal-nav-item.active{background:#fff;color:#DA291C;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .portal-main{flex:1;min-width:0;}
  .portal-panel-title{font-weight:700;font-size:14.5px;color:#1a1a1a;margin-bottom:2px;}
  .portal-panel-sub{font-size:11px;color:#8A939B;margin-bottom:12px;}
  .portal-card{background:#fff;border:1px solid #E4E7EA;border-radius:10px;padding:4px 16px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .portal-field-row{display:flex;align-items:center;gap:12px;padding:11px 0;flex-wrap:wrap;}
  .portal-field-row + .portal-field-row{border-top:1px solid #EEF0F2;}
  .portal-field-label{font-size:11px;color:#8A939B;width:90px;flex-shrink:0;}
  .portal-field-value{flex:1;font-size:12px;color:#1a1a1a;min-width:120px;outline:none;font-weight:600;white-space:nowrap;}
  .portal-meta{font-size:10.5px;color:#8A939B;margin-top:10px;}
  .portal-edit-btn, .portal-save-btn{background:#DA291C;color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;min-height:auto;font-weight:600;}
  .portal-save-btn{margin-top:12px;}
  .cursor-arrow{
    position:absolute;width:18px;height:18px;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
    transition:left .9s cubic-bezier(.22,.61,.36,1), top .9s cubic-bezier(.22,.61,.36,1);
    left:8%;top:55%;pointer-events:none;z-index:5;
  }
  .click-ripple{position:absolute;width:10px;height:10px;border:2px solid #DA291C;border-radius:50%;transform:translate(-50%,-50%);animation:ripple .5s ease-out;pointer-events:none;}
  @keyframes ripple{from{width:10px;height:10px;opacity:1;}to{width:44px;height:44px;opacity:0;}}
  .toast{position:absolute;bottom:14px;left:50%;transform:translate(-50%,20px);background:#1a7f37;color:#fff;padding:9px 18px;border-radius:8px;font-size:12.5px;font-weight:600;opacity:0;transition:all .35s ease;box-shadow:0 8px 20px -8px rgba(0,0,0,.4);}
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* ---------- Screen 10: signature ---------- */
  .approval-card{display:flex;gap:14px;align-items:center;padding:14px 16px;border:1px solid #EAD9B8;border-radius:10px;background:var(--amber-pale);margin:20px 0 4px;max-width:520px;}
  .sign-cols{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:start;margin-top:8px;}
  .doc-preview{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px 26px;max-width:440px;box-shadow:0 12px 32px -20px rgba(28,28,28,.35);margin:14px 0 4px;}
  .doc-preview-title{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;margin-bottom:12px;}
  .doc-row{display:flex;justify-content:space-between;gap:16px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
  .doc-row-label{color:var(--ink-soft);}
  .doc-row-value{font-weight:600;text-align:right;}
  .doc-sig-slot{margin-top:16px;border-bottom:1px solid var(--ink);min-height:44px;display:flex;align-items:flex-end;}
  .doc-sig-slot img{max-height:42px;width:auto;}
  .doc-sig-label{font-size:10.5px;color:var(--ink-soft);margin-top:4px;}
  .sig-pad-wrap{margin-top:14px;}
  .sig-pad{
    width:100%;max-width:420px;height:150px;background:#fff;
    border:1.5px dashed #b9c7b9;border-radius:10px;touch-action:none;cursor:crosshair;display:block;position:relative;
  }
  .sig-pad-row{display:flex;align-items:center;justify-content:space-between;max-width:420px;margin-top:6px;}
  .sig-hint{font-size:11.5px;color:var(--ink-soft);}

  /* ---------- Screen 11: done ---------- */
  .done-screen{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .done-badge{width:72px;height:72px;border-radius:50%;background:var(--td-green);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;animation:scaleIn .4s ease both;box-shadow:0 14px 34px -14px rgba(0,138,0,.55);}
  @keyframes scaleIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
  .stat-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:14px 0 4px;}
  .stat-chip{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--td-green-pale);color:var(--td-green-dark);border-radius:999px;padding:6px 14px;font-weight:600;}
  .done-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:680px;margin:26px 0;text-align:left;}
  .done-summary-grid.single{grid-template-columns:1fr;max-width:440px;}
  .done-summary-col{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;}
  .done-summary-title{font-weight:700;font-size:13px;color:var(--td-green-dark);margin-bottom:10px;}
  .done-row{font-size:13px;padding:5px 0;display:flex;align-items:center;gap:10px;}
  .pdf-card{border:1px solid var(--line);border-radius:12px;padding:18px 22px;background:#fff;display:flex;align-items:center;gap:16px;max-width:560px;width:100%;text-align:left;box-shadow:0 12px 30px -22px rgba(28,28,28,.3);}
  .pdf-icon{width:44px;height:44px;border-radius:10px;background:var(--amber-pale);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .pdf-card-text{flex:1;min-width:0;}
  .pdf-card-title{font-weight:700;font-size:14.5px;}
  .pdf-card-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}

  /* ---------- HUD ---------- */
  #hud{position:fixed;bottom:16px;left:16px;background:rgba(12,23,16,.92);color:#CFEFDA;font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 14px;border-radius:8px;z-index:999;}
  #hud a{color:#8FE8A8;margin-left:12px;text-decoration:underline;cursor:pointer;}

  /* ---------- responsive ---------- */
  @media (max-width: 900px){
    .scenario-grid{grid-template-columns:1fr;}
    .welcome-screen{grid-template-columns:1fr;}
    .welcome-left h1{font-size:38px;}
    .landing h1{font-size:34px;}
    .migrate-grid{grid-template-columns:1fr;}
    .migrate-head{flex-direction:column;}
    .migrate-progress{text-align:left;}
    .done-summary-grid, .scan-results, .review-list, .plan-list{grid-template-columns:1fr;}
    .sign-cols{grid-template-columns:1fr;}
    .screen-pad{padding:36px 24px;}
  }

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:0.001ms !important; animation-iteration-count:1 !important;
      transition-duration:0.001ms !important; scroll-behavior:auto !important;
    }
  }
</style>
</head>
<body>

<header class="chrome-bar">
  <div class="chrome-left">
    <span class="logo-tap" id="logoTap"><img src="assets/logos/switcheasy.png" alt="SwitchEasy" id="logoImg"></span>
    <span class="wordmark">SwitchEasy <small>by TD</small></span>
    <span class="proto-pill">TD Open Banking</span>
  </div>
  <button class="restart-btn" id="restartBtn" type="button">Restart</button>
</header>

<nav class="rail" id="rail"></nav>

<main id="stage">
  <div id="device">
    <div id="screen-root"></div>
  </div>
</main>

<div id="hud" hidden>
  <span id="hudScreen"></span>
  <a id="hudSkip">skip →</a>
</div>

<script type="module">
import { banks, personas, timings, agentLogLines, credentialGroups, accessInfo, appLogo } from './config.js';

const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const T = prefersReduced
  ? Object.fromEntries(Object.entries(timings).map(([k, v]) => [k, Math.max(1, Math.round(v * 0.15))]))
  : timings;

const LOCK_SVG = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>';
const CURSOR_SVG = '<svg width="18" height="18" viewBox="0 0 20 20"><path d="M3 1 L3 16.2 L7.1 12.6 L9.6 18.4 L12.3 17.2 L9.8 11.5 L15.2 11 Z" fill="#1a1a1a" stroke="#fff" stroke-width="1.1" stroke-linejoin="round"/></svg>';

const els = {
  logoTap: document.getElementById('logoTap'),
  logoImg: document.getElementById('logoImg'),
  restartBtn: document.getElementById('restartBtn'),
  rail: document.getElementById('rail'),
  device: document.getElementById('device'),
  screenRoot: document.getElementById('screen-root'),
  hud: document.getElementById('hud'),
  hudScreen: document.getElementById('hudScreen'),
  hudSkip: document.getElementById('hudSkip'),
};

/* ---------- image fallback system ----------
 * Any <img data-fb="path"> retries that path once on error;
 * after that, data-emoji swaps in an emoji span, or data-letter a lettered tile.
 * Handled by one delegated capture listener so dynamically added rows work too. */
function handleImgError(img) {
  if (img.dataset.fb) {
    const fb = img.dataset.fb;
    img.removeAttribute('data-fb');
    img.src = fb;
    return;
  }
  if ('emoji' in img.dataset) {
    if (!img.dataset.emoji) { img.remove(); return; } // decorative — drop silently
    const span = document.createElement('span');
    span.className = 'tile-emoji';
    span.textContent = img.dataset.emoji;
    img.replaceWith(span);
    return;
  }
  if (img.dataset.letter) {
    const div = document.createElement('div');
    div.className = img.dataset.letterClass || 'bank-fallback';
    div.textContent = img.dataset.letter;
    img.replaceWith(div);
  }
}
document.addEventListener('error', e => {
  if (e.target instanceof HTMLImageElement) handleImgError(e.target);
}, true);

els.logoImg.dataset.fb = appLogo.fallback;
els.logoImg.dataset.letter = 'TD';
els.logoImg.dataset.letterClass = 'bank-fallback small';
if (appLogo.src) els.logoImg.src = appLogo.src;

// biller/persona icon tile: PNG first, emoji fallback
function tile(entity, size) {
  const cls = 'tile' + (size ? ' ' + size : '');
  if (entity.logo || entity.img) {
    return `<span class="${cls}"><img src="${entity.logo || entity.img}" alt="" data-emoji="${entity.icon}"></span>`;
  }
  return `<span class="${cls}"><span class="tile-emoji">${entity.icon}</span></span>`;
}

els.screenRoot.style.transition = `opacity ${timings.screenFade / 2}ms ease, transform ${timings.screenFade / 2}ms ease`;

function freshState() {
  return {
    screen: 0, personaKey: null, persona: null, bankId: null, bankName: null,
    selectedTx: [], credQueue: [], credIndex: 0,
    signatureName: '', signatureData: null,
    finalAuto: 0, finalFlagged: 0, _locked: false,
  };
}
let state = freshState();

let activeTimers = [];
function schedule(fn, ms) { const id = setTimeout(fn, ms); activeTimers.push(id); return id; }
function clearAllTimers() { activeTimers.forEach(id => { clearTimeout(id); clearInterval(id); }); activeTimers = []; }

/*
 * Screen map:
 * 0 landing · 1 welcome · 2 institution · 3 connect old bank · 4 scan ·
 * 5 review · 6 access plan (AUTO) · 7 credentials (one per group) ·
 * 8 consent · 9 agent run · 10 signature · 11 done
 */
const railSegments = ['Start', 'Connect', 'Scan', 'Review', 'Authorize', 'Migrate', 'Done'];
const screenToSegment = [0, 0, 1, 1, 2, 3, 4, 4, 4, 5, 5, 6];
function renderRail() {
  const current = screenToSegment[state.screen];
  els.rail.innerHTML = railSegments.map((label, i) => `
    <div class="rail-segment ${i < current ? 'completed' : ''} ${i === current ? 'current' : ''}">
      <span class="rail-dot"></span>
      <span class="rail-label">${label}</span>
    </div>`).join('');
}

const screenNames = ['Landing', 'Welcome', 'Institution', 'Connect', 'Scan', 'Review', 'Access plan', 'Credentials', 'Consent', 'Agent', 'Signature', 'Done'];
function updateHud() {
  if (!els.hud.hidden) els.hudScreen.textContent = `Screen ${state.screen}: ${screenNames[state.screen]}`;
}

function goTo(newScreen) {
  clearAllTimers();
  els.screenRoot.style.opacity = '0';
  els.screenRoot.style.transform = 'translateY(6px)';
  schedule(() => {
    state.screen = newScreen;
    els.screenRoot.innerHTML = '';
    renderRail();
    updateHud();
    screens[newScreen]();
    els.screenRoot.style.opacity = '1';
    els.screenRoot.style.transform = 'translateY(0)';
  }, timings.screenFade / 2);
}

function restart() {
  clearAllTimers();
  state = freshState();
  goTo(0);
}
els.restartBtn.addEventListener('click', restart);

let tapTimes = [];
els.logoTap.addEventListener('click', () => {
  const now = Date.now();
  tapTimes = tapTimes.filter(t => now - t < 600);
  tapTimes.push(now);
  if (tapTimes.length >= 3) {
    tapTimes = [];
    els.hud.hidden = !els.hud.hidden;
    updateHud();
  }
});
els.hudSkip.addEventListener('click', advanceFromHud);

function advanceFromHud() {
  clearAllTimers();
  switch (state.screen) {
    case 0:
      state.personaKey = 'personal';
      state.persona = personas.personal;
      state.selectedTx = state.persona.transactions.map(t => ({ ...t, selected: true }));
      goTo(1);
      break;
    case 2:
      if (!state.bankId) { state.bankId = 'rbc'; state.bankName = 'RBC'; }
      goTo(3);
      break;
    case 3:
      goTo(4);
      break;
    case 7:
      goTo(8);
      break;
    case 9: {
      const items = state.selectedTx.filter(t => t.selected);
      state.finalAuto = items.filter(t => !t.needsApproval).length;
      state.finalFlagged = items.filter(t => t.needsApproval).length;
      goTo(state.finalFlagged > 0 ? 10 : 11);
      break;
    }
    case 10:
      if (!state.signatureName) state.signatureName = 'Demo User';
      goTo(11);
      break;
    default:
      goTo(Math.min(11, state.screen + 1));
  }
}

function selectedItems() { return state.selectedTx.filter(t => t.selected); }
function credGroupsNeeded() {
  const present = new Set(selectedItems().map(t => t.access));
  return Object.keys(credentialGroups).filter(id => present.has(id));
}

/* ---------------- Screen 0: landing ---------------- */
// INPUT PAUSE: tap a scenario card → 300ms selected beat → advance.
function renderLanding() {
  els.screenRoot.innerHTML = `
    <div class="screen-pad landing">
      <div class="landing-mark">
        <img src="${appLogo.src}" alt="SwitchEasy" data-fb="${appLogo.fallback}" data-letter="TD">
        <span class="landing-wordmark">SwitchEasy</span>
      </div>
      <h1>Switch banks without the busywork.</h1>
      <p class="subcopy">SwitchEasy is TD's AI agent that moves your entire financial life — bills, subscriptions, deposits and payees — from your old bank to TD. You approve; it does the work.</p>
      <div class="trust-row">
        ${LOCK_SVG} Read-only bank access
        <span class="sep">·</span> You approve every change
        <span class="sep">·</span> Powered by TD Open Banking
      </div>
      <div class="landing-picker-label">Who's switching today?</div>
      <div class="scenario-grid">
        ${Object.entries(personas).map(([key, p], i) => `
          <button type="button" class="scenario-card" data-key="${key}" style="animation-delay:${i * 80}ms">
            ${tile(p, 'lg')}
            <div class="scenario-card-label">${p.label}</div>
            <div class="scenario-card-tagline">${p.tagline}</div>
            <div class="scenario-card-cta">Get started →</div>
          </button>`).join('')}
      </div>
    </div>`;

  els.screenRoot.querySelectorAll('.scenario-card').forEach(card => {
    card.addEventListener('click', () => {
      if (state._locked) return;
      state._locked = true;
      els.screenRoot.querySelectorAll('.scenario-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      const key = card.dataset.key;
      state.personaKey = key;
      state.persona = personas[key];
      state.selectedTx = state.persona.transactions.map(t => ({ ...t, selected: true }));
      schedule(() => { state._locked = false; goTo(1); }, 300);
    });
  });
}

/* ---------------- Screen 1: welcome ---------------- */
// INPUT PAUSE: "Start my switch →"
function renderWelcome() {
  els.screenRoot.innerHTML = `
    <div class="screen-pad">
      <div class="welcome-screen">
        <div class="welcome-left">
          <div class="pill-badge"><span class="dot"></span> AGENTIC AI</div>
          <h1>Your switch,<br>handled.</h1>
          <p class="subcopy">Moving banks means untangling every bill, deposit and payee by hand. SwitchEasy is an agent that does it for you — it scans, plans, and independently migrates every recurring payment to TD, then shows you the receipts.</p>
          <div class="stat-row mono">
            <span>0 forms to fill out</span><span class="sep">·</span><span>0 phone calls</span><span class="sep">·</span><span>minutes, not weeks</span>
          </div>
          <button type="button" class="btn-primary" id="startBtn">Start my switch →</button>
        </div>
        <div class="welcome-right">
          <div class="how-card">
            <div class="how-title">How it works</div>
            <div class="how-step">
              <div class="how-num">1</div>
              <div><div class="how-step-title">Connect your old bank</div>
              <div class="how-step-sub">Read-only access — SwitchEasy can never move your money.</div></div>
            </div>
            <div class="how-step">
              <div class="how-num">2</div>
              <div><div class="how-step-title">The agent finds every payment</div>
              <div class="how-step-sub">Bills, subscriptions, deposits and payees — nothing gets missed.</div></div>
            </div>
            <div class="how-step">
              <div class="how-num">3</div>
              <div><div class="how-step-title">You authorize, it migrates</div>
              <div class="how-step-sub">The agent signs in and moves each one. Anything sensitive waits for you.</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('startBtn').addEventListener('click', () => goTo(2));
}

/* ---------------- Screen 2: choose old institution ---------------- */
// INPUT PAUSE: select (+ optionally type) → "Continue →"
function renderInstitution() {
  els.screenRoot.innerHTML = `
    <div class="screen-pad">
      <h1>Where are you switching from?</h1>
      <p class="subcopy">SwitchEasy connects to your current institution to read your transaction history.</p>
      <div class="bank-grid">
        ${banks.map(b => `
          <button type="button" class="bank-card" data-id="${b.id}" style="--card-brand:${b.brand}" aria-label="${b.name}">

              <div class="portal-meta">${tx.name} · Changes take effect on your next billing cycle.</div>
            </div>
          </div>
          <div class="cursor-arrow" id="cursorArrow">${CURSOR_SVG}</div>
          <div class="toast" id="portalToast">Payment method updated.</div>
        </div>
      </div>`;
    panelHost.appendChild(panel);
    requestAnimationFrame(() => panel.classList.add('expanded'));

    const cursor = panel.querySelector('#cursorArrow');
    const editBtn = panel.querySelector('#portalEdit');
    const valueEl = panel.querySelector('#portalValue');
    const saveBtn = panel.querySelector('#portalSave');
    const toast = panel.querySelector('#portalToast');
    const pageEl = panel.querySelector('.browser-page');

    schedule(() => {
      moveCursorTo(cursor, editBtn, () => {
        rippleAt(pageEl, editBtn);
        schedule(() => {
          editBtn.hidden = true;
          valueEl.textContent = '';
          saveBtn.hidden = false;
          typeText(valueEl, 'TD Canada Trust — •••• •••• 4471', T.killerTypeDelay, () => {
            schedule(() => {
              moveCursorTo(cursor, saveBtn, () => {
                rippleAt(pageEl, saveBtn);
                schedule(() => {
                  toast.classList.add('show');
                  schedule(() => {
                    panel.classList.remove('expanded');
                    schedule(() => { panel.remove(); cb(); }, 500);
                  }, 1200);
                }, 150);
              });
            }, 200);
          });
        }, 150);
      });
    }, 500);
  }

  function processTx(i) {
    if (i >= items.length) { finish(); return; }
    const tx = items[i];
    const lines = agentLogLines(tx);
    const pre = lines.slice(0, -1);
    const last = lines[lines.length - 1];
    currentTile.innerHTML = tile(tx, 'lg');
    currentName.textContent = tx.name;
    setRowState(i, 'In progress', '', true);

    let j = 0;
    function playPre() {
      if (j < pre.length) {
        // the first log line just re-states the item — show a friendlier step instead
        if (j === 0) {
          currentStatus.innerHTML = `Preparing the ${tx.cat} update` + DOTS;
          ticker.textContent = 'agent · ' + pre[0].text;
        } else {
          showStep(pre[j].text, true);
        }
        j++;
        schedule(playPre, T.termAfterOk);
      } else if (tx.killerShot) {
        runKillerShot(tx, () => {
          showStep(last.text, false);
          setRowState(i, 'Moved ✓', 'ok', false);
          updateDone();
          schedule(() => processTx(i + 1), T.termLineDelay);
        });
      } else {
        showStep(last.text, false);
        const ok = last.type === 'ok';
        setRowState(i, ok ? 'Moved ✓' : 'Needs signature', ok ? 'ok' : 'warn', false);
        updateDone();
        schedule(() => processTx(i + 1), T.termLineDelay);
      }
    }
    playPre();
  }

  function finish() {
    const autoCount = items.filter(t => !t.needsApproval).length;
    const flaggedCount = items.filter(t => t.needsApproval).length;
    state.finalAuto = autoCount;
    state.finalFlagged = flaggedCount;
    currentTile.innerHTML = `<span class="tile lg" style="background:var(--td-green);border:none;color:#fff;"><span class="tile-emoji" style="font-size:26px;">✓</span></span>`;
    currentName.textContent = 'All payments handled';
    currentStatus.textContent = flaggedCount > 0
      ? `${autoCount} moved automatically — ${flaggedCount} waiting for your signature.`
      : 'Everything moved automatically.';
    ticker.textContent = `agent · run complete — ${autoCount} migrated, ${flaggedCount} flagged`;
    livePill.innerHTML = '✓ AGENT FINISHED';
    els.screenRoot.querySelector('#migrateHeading').textContent = 'Your payments have moved.';
    els.screenRoot.querySelector('#migrateSub').textContent = flaggedCount > 0
      ? 'Almost there — one form just needs your signature on the next screen.'
      : 'Everything is set up at TD. Review the summary on the next screen.';
    footer.hidden = false;
    footerText.textContent = `Run complete — ${autoCount} migrated, ${flaggedCount} awaiting your signature.`;
    footer.classList.add('fade-in');
  }

  continueBtn.addEventListener('click', () => {
    goTo(state.finalFlagged > 0 ? 10 : 11);
  });

  if (items.length === 0) { finish(); return; }
  schedule(() => processTx(0), T.termLineDelay);
}

/* ---------------- Screen 10: signature ---------------- */
// INPUT PAUSE: draw a signature + type name + tap "Approve & finish →"
function renderSignature() {
  const flaggedItems = state.selectedTx.filter(t => t.selected && t.needsApproval);
  const first = flaggedItems[0];
  els.screenRoot.innerHTML = `
    <div class="screen-pad">
      <h1>One needs your sign-off</h1>
      ${flaggedItems.map(t => `
        <div class="approval-card">
          ${tile(t)}
          <span class="tx-info"><span class="tx-name">${t.name}</span><span class="tx-sub">${t.sub}</span></span>
        </div>`).join('')}
      <p class="subcopy" style="margin-top:16px;">${first.approvalNote || 'A signed form is required for this change. The agent has pre-filled it — it just needs your signature.'}</p>
      <div class="sign-cols">
        <div>
          <div class="doc-preview">
            <div class="doc-preview-title">${first.formName || 'Direct Deposit Authorization'} · pre-filled</div>
            <div class="doc-row"><span class="doc-row-label">${first.formParty || 'Employer'}</span><span class="doc-row-value">${first.name}</span></div>
            <div class="doc-row"><span class="doc-row-label">New institution</span><span class="doc-row-value">TD Canada Trust</span></div>
            <div class="doc-row"><span class="doc-row-label">Account</span><span class="doc-row-value mono">•••• •••• 4471</span></div>
            <div class="doc-sig-slot" id="docSigSlot"></div>
            <div class="doc-sig-label">Signature</div>
          </div>
        </div>
        <div>
          <label class="field-label">Your full name</label>
          <input type="text" id="signInput" placeholder="Full name" autocomplete="off">
          <div class="sig-pad-wrap">
            <label class="field-label" style="margin-top:0;">Sign below</label>
            <canvas class="sig-pad" id="sigPad"></canvas>
            <div class="sig-pad-row">
              <span class="sig-hint" id="sigHint">Draw your signature with your finger or mouse</span>
              <button type="button" class="btn-ghost" id="sigClear">Clear</button>
            </div>
          </div>
          <div style="margin-top:18px;">
            <button type="button" class="btn-primary" id="approveBtn" disabled>Approve & finish →</button>
          </div>
        </div>
      </div>
    </div>`;

  const signInput = els.screenRoot.querySelector('#signInput');
  const approveBtn = els.screenRoot.querySelector('#approveBtn');
  const canvas = els.screenRoot.querySelector('#sigPad');
  const clearBtn = els.screenRoot.querySelector('#sigClear');
  const sigHint = els.screenRoot.querySelector('#sigHint');
  const docSigSlot = els.screenRoot.querySelector('#docSigSlot');

  // signature pad
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  let hasInk = false;
  function sizePad() {
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);
    ctx.lineWidth = 2.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#1C1C1C';
  }
  sizePad();

  let drawing = false;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  canvas.addEventListener('pointerdown', e => {
    drawing = true;
    canvas.setPointerCapture(e.pointerId);
    const { x, y } = pos(e);
    ctx.beginPath();
    ctx.moveTo(x, y);
    e.preventDefault();
  });
  canvas.addEventListener('pointermove', e => {
    if (!drawing) return;
    const { x, y } = pos(e);
    ctx.lineTo(x, y);
    ctx.stroke();
    if (!hasInk) { hasInk = true; sigHint.textContent = 'Looks good.'; }
    updateEnable();
    e.preventDefault();
  });
  function endStroke() {
    if (!drawing) return;
    drawing = false;
    if (hasInk) updatePreview();
  }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);

  clearBtn.addEventListener('click', () => {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.scale(dpr, dpr);
    hasInk = false;
    sigHint.textContent = 'Draw your signature with your finger or mouse';
    docSigSlot.innerHTML = '';
    updateEnable();
  });

  function updatePreview() {
    docSigSlot.innerHTML = `<img src="${canvas.toDataURL('image/png')}" alt="signature">`;
  }
  function updateEnable() {
    approveBtn.disabled = !(hasInk && signInput.value.trim());
  }
  signInput.addEventListener('input', updateEnable);

  approveBtn.addEventListener('click', () => {
    state.signatureName = signInput.value.trim();
    state.signatureData = hasInk ? canvas.toDataURL('image/png') : null;
    goTo(11);
  });
}

/* ---------------- Screen 11: done ---------------- */
function renderDone() {
  const N = selectedItems().length;
  const auto = state.finalAuto;
  const flagged = state.finalFlagged;
  const flaggedItem = state.selectedTx.find(t => t.selected && t.needsApproval);
  if (flagged > 0 && !state.signatureName) state.signatureName = 'Demo User';

  els.screenRoot.innerHTML = `
    <div class="screen-pad done-screen">
      <div class="done-badge">✓</div>
      <h1>${auto} of ${N} payments moved automatically.</h1>
      ${flagged > 0 ? `<p class="subcopy">${flagged} signed by you — everything is live at TD.</p>` : `<p class="subcopy">Everything is live at TD.</p>`}
      <div class="stat-chips">
        <span class="stat-chip">${auto} auto-migrated</span>
        ${flagged > 0 ? `<span class="stat-chip">${flagged} signed by you</span>` : ''}
        <span class="stat-chip">0 phone calls · 0 hold music</span>
      </div>
      <div class="done-summary-grid ${flagged > 0 ? '' : 'single'}">
        <div class="done-summary-col">
          <div class="done-summary-title">Moved ✓</div>
          ${state.selectedTx.filter(t => t.selected && !t.needsApproval).map(t => `<div class="done-row">${tile(t, 'sm')} ${t.name}</div>`).join('')}
        </div>
        ${flagged > 0 ? `
        <div class="done-summary-col">
          <div class="done-summary-title">Signed & sent ✓</div>
          ${state.selectedTx.filter(t => t.selected && t.needsApproval).map(t => `<div class="done-row">${tile(t, 'sm')} ${t.name}</div>`).join('')}
        </div>` : ''}
      </div>
      ${flagged > 0 ? `
      <div class="pdf-card">
        <div class="pdf-icon">📄</div>
        <div class="pdf-card-text">
          <div class="pdf-card-title">${flaggedItem && flaggedItem.formName ? flaggedItem.formName : 'Direct deposit form'}</div>
          <div class="pdf-card-sub">Pre-filled with your new TD account and signed by ${state.signatureName}</div>
        </div>
        <button type="button" class="btn-primary" id="pdfBtn">Download PDF</button>
      </div>` : ''}
    </div>`;

  if (flagged > 0) {
    document.getElementById('pdfBtn').addEventListener('click', () => generatePdf(flaggedItem));
  }
}

function generatePdf(tx) {
  const btn = document.getElementById('pdfBtn');
  if (!window.jspdf) {
    if (btn) { btn.textContent = 'PDF unavailable offline'; btn.disabled = true; }
    return;
  }
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });
    doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(0, 138, 0);
    doc.text('TD ' + (tx.formName || 'Direct Deposit Authorization'), 54, 60);
    doc.setDrawColor(220, 227, 220); doc.line(54, 72, 558, 72);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(11); doc.setTextColor(28, 28, 28);
    let y = 110;
    const row = (label, value) => {
      doc.setFont('helvetica', 'bold'); doc.text(label, 54, y);
      doc.setFont('helvetica', 'normal'); doc.text(String(value), 220, y);
      y += 28;
    };
    row(tx.formParty === 'Payroll provider' ? 'Authorized signatory:' : 'Employee name:', state.signatureName);
    row((tx.formParty || 'Employer') + ':', tx.name);
    row('New institution:', 'TD Canada Trust');
    row('Transit number:', '01847');
    row('Institution number:', '004');
    row('Account number:', '•••• •••• 4471');
    row('Effective date:', new Date().toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' }));
    y += 40;
    if (state.signatureData) {
      // drawn signature image sits on the signature line
      doc.addImage(state.signatureData, 'PNG', 56, y - 44, 140, 50);
    } else {
      doc.setFont('helvetica', 'italic'); doc.setFontSize(13);
      doc.text(state.signatureName, 60, y - 6);
    }
    doc.setDrawColor(28, 28, 28); doc.line(54, y, 300, y);
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(97, 97, 97);
    doc.text('Signature', 54, y + 12);
    doc.text('Generated automatically by SwitchEasy · sample data for demo purposes', 54, 740);
    doc.save('TD-Direct-Deposit-Authorization.pdf');
  } catch (e) {
    if (btn) { btn.textContent = 'PDF unavailable offline'; btn.disabled = true; }
  }
}

const screens = {
  0: renderLanding, 1: renderWelcome, 2: renderInstitution, 3: renderConnect,
  4: renderScan, 5: renderReview, 6: renderAccessPlan, 7: renderCredentials,
  8: renderConsent, 9: renderAgent, 10: renderSignature, 11: renderDone,
};

renderRail();
screens[0]();
</script>
